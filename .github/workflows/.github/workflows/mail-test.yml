name: 📧 SMTP邮件测试

on:
  workflow_dispatch:

jobs:
  mail-test:
    runs-on: ubuntu-latest

    steps:
      - name: 测试发送邮件
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: GitHub Actions SMTP测试
          to: ${{ secrets.MAIL_ADDRESS }}
          from: ${{ secrets.MAIL_ADDRESS }}
          body: |
            这是一封 GitHub Actions SMTP 测试邮件。

            如果收到，说明：
            ✅ QQ SMTP正常
            ✅ GitHub Secrets配置正确
            ✅ Action发送邮件正常
